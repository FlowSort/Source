services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: flowsort_control
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d flowsort_control"]
      interval: 3s
      timeout: 3s
      retries: 20
    volumes:
      - flowsort_postgres:/var/lib/postgresql/data
      - ./docker-init.sql:/docker-entrypoint-initdb.d/10-tenants.sql:ro

volumes:
  flowsort_postgres:
